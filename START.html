<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0; url=http://localhost:4000/login.html">
    <title>FoodBridge - Starting...</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #f8f3ff 0%, #ffffff 100%);
        }
        .container {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(91, 52, 163, 0.1);
        }
        h1 {
            color: #5a2ca0;
            margin-bottom: 20px;
        }
        p {
            color: #7a6f92;
            margin: 10px 0;
        }
        .button {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background: #5a2ca0;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
        }
        .button:hover {
            background: #432074;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍽️ FoodBridge</h1>
        <p>Redirecting to login page...</p>
        <p>If page doesn't load, make sure server is running!</p>
        <a href="http://localhost:4000/login.html" class="button">Click here to open Login</a>
        <p style="margin-top: 30px; font-size: 14px; color: #999;">
            Server must be running first!<br>
            Run: <code>npm start</code> in terminal
        </p>
    </div>
</body>
</html>
